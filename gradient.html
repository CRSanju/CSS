<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient</title>
    <style>
        #grad1 {
            height: 200px;
            background-color: red;
            background: linear-gradient(45deg, red, yellow);
            /* background: linear-gradient(to right, red, yellow, green, pink); */
            /* background: linear-gradient(to right, red 20%, yellow 50% , green 100%); */
        }

         #grad2 {
            height: 200px;
            background-color: red;
            /* background: radial-gradient(circle, red, yellow, green, blue, pink, white); */
            background: radial-gradient(circle at top left, red, yellow, green, blue, pink, white);
        }

         #grad3 {
            height: 200px;
            width: 200px;
            border-radius: 50%;
            background-color: red;
            /* background: conic-gradient(red, yellow, green, blue); */
            background: conic-gradient(red 0deg 90deg, blue 90deg 180deg); 
        }
    </style>
</head>
<body>
    <h2>Linear Gradient</h2>
    <div id="grad1"></div>
    <h2>Radial Gradient</h2>
     <div id="grad2"></div>
    <h2>Conic Gradient</h2>
    <div id="grad3"></div>
    
</body>
</html>

<!doctype html>
<html>
  <head>
    <title>Animation Example</title>
    <link rel="icon" type="image/png" href="favicon.png" />

    <style>
      img {
        width: 250px;

        /* Hide initially */
        opacity: 0;
        transform: translateX(1400px);

        /* Animate after load */
        animation: slideRightToLeft 10s ease-out forwards;
        animation-delay: 3s;
      }

      @keyframes slideRightToLeft {
        from {
          transform: translateX(1400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <img src="/MEDIA/elephant.png" alt="image" />
  </body>
</html>

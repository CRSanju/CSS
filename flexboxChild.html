<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox Child</title>
    <link href="styleflex2.css" rel="stylesheet">
</head>
<body>
     <div class="container">
        <div class="div1" style="align-self: flex-start;">1</div>

        <div class="div5" style="align-self: center;">5</div>
        <div class="div6">6</div>
    </div>
